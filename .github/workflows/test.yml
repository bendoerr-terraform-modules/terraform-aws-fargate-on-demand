name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: sandbox-test
  cancel-in-progress: false

jobs:
  terratest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        project:
          - modules/launcher/test
          - modules/persistence/test
          - modules/notice-discord/test
          - modules/dns-record/test
          - modules/notice-github/test

    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Setup Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ matrix.project }}/go.mod
          cache: true

      - name: "Setup Terraform"
        uses: step-security/setup-terraform@11f45fe036ccfd27d231861d38b183d405b059a9 # v4.0.0

      - name: "Setup SSH Agent"
        uses: step-security/ssh-agent@04004923389ca1b759b2bee0005f2db1253aeb15 # v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.ORG_ACCESS_SSH_KEY }}

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::234656776442:role/brd-sndbx-ue1-core-apply
          aws-region: us-east-1

      - name: "Install JUnit Reporter"
        working-directory: ${{ matrix.project }}
        run: go install github.com/jstemmer/go-junit-report/v2@v2.1.0

      - name: "Run Tests"
        working-directory: ${{ matrix.project }}
        shell: bash
        run: go test -timeout 20m -v ./... 2>&1 | tee results.out
        env:
          TF_VAR_assume_principal: "arn:aws:iam::234656776442:role/brd-sndbx-ue1-core-apply"
          DISCORD_BOT_AUTH_TOKEN: ${{ secrets.DISCORD_BOT_AUTH_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          GITHUB_STATUS_REPO: bendoerr-terraform-modules/notice-github-sandbox
          NOTICE_GITHUB_TOKEN: ${{ secrets.NOTICE_GITHUB_TOKEN }}

      - name: "Convert Test Results"
        working-directory: ${{ matrix.project }}
        shell: bash
        if: always() && hashFiles(format('{0}/results.out', matrix.project)) != ''
        run: go-junit-report -set-exit-code < results.out > results.xml

      - name: "Upload Test Results"
        uses: step-security/test-summary-action@67391420afc3eba57f4cb249a1a5a677e0eacd9e # v2.4.3
        if: always() && hashFiles(format('{0}/results.xml', matrix.project)) != ''
        with:
          paths: ${{ matrix.project }}/results.xml
