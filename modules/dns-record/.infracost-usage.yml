version: 0.1
resource_usage:
  aws_route53_record.this:
    # See ../launcher/.infracost-usage.yml for assumption
    monthly_standard_queries: 1314000

    # Monthly number of Latency Based Routing queries.
    monthly_latency_based_queries: 0

    # Monthly number of Geo DNS and Geoproximity queries.
    monthly_geo_queries: 0

  aws_cloudwatch_log_group.query[0]:
    # Lookups per Log Retention * Log Size
    # 259200 (seconds in 3 days / 2) * 0.1KiB = 0.027GB
    storage_gb: 0.03

    # Monthly data ingested by CloudWatch logs in GB.
    # 1314000 * 0.1KiB = 0.1314 GiB
    monthly_data_ingested_gb: 0.14

    # Monthly data scanned by CloudWatch logs insights in GB.
    monthly_data_scanned_gb: 0.0
