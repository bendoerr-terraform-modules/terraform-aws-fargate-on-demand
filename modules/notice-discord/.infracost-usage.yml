# Scenario:
#   An event is triggered every minute
#   = 1440 events a day
#   = 43200 events a month
#
version: 0.1
resource_usage:
  aws_cloudwatch_log_group.notice:
    # Total data stored by CloudWatch logs in GB.
    # Observation: 1.5KB per lambda invocation
    # Configuration: 3 days of retention
    # -> 1.5KB * 1440 * 3 = 6.5MB = 0.0065GB
    storage_gb: 0.0065

    # Monthly data ingested by CloudWatch logs in GB.
    # Observation: 1.5KB per lambda invocation
    # -> 1.5KB * 43200 = 65MB = 0.065GB
    monthly_data_ingested_gb: 0.065

    # Monthly data scanned by CloudWatch logs insights in GB.
    # None
    monthly_data_scanned_gb: 0.0

  aws_lambda_function.notice:
    # Monthly requests to the Lambda function.
    monthly_requests: 43200

    # Average duration of each request in milliseconds.
    # Observed startup duration + execution: 500ms
    # Observed execution: 300ms
    # Pick a worst case middle ground around 400
    request_duration_ms: 400
